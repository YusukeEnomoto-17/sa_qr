<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRレシート発行システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <!-- QRコード生成ライブラリ QRious -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  
  <style>
    :root {
      --primary: #2c3e50;
      --accent: #3498db;
      --success: #27ae60;
      --warning: #e74c3c;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #333333;
      --text-light: #7f8c8d;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
    }
    
    /* パスコード認証画面のスタイル */
    #auth-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: var(--primary);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .auth-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .auth-box h2 {
      margin-top: 0;
      color: var(--primary);
      font-size: 22px;
    }
    .auth-box p {
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 25px;
    }
    .auth-input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: 2px solid #ddd;
      border-radius: 6px;
      text-align: center;
      box-sizing: border-box;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }
    .auth-input:focus {
      border-color: var(--accent);
      outline: none;
    }
    .btn-auth {
      background-color: var(--accent);
      color: white;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    /* ヘッダー */
    header {
      background-color: var(--primary);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .header-logo {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    header h1 {
      margin: 0;
      font-size: 24px;
    }
    .version-container {
      font-size: 12px;
      color: #bdc3c7;
      background-color: rgba(255, 255, 255, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      font-family: monospace;
    }
    .version-container span {
      font-weight: bold;
    }
    .controls {
      display: flex;
      gap: 15px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover:not(:disabled) {
      opacity: 0.8;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
    .btn-disconnected {
      background-color: var(--warning);
      color: white;
      animation: pulse 2s infinite;
    }
    .btn-connected {
      background-color: var(--success);
      color: white;
    }
    .btn-test {
      background-color: #95a5a6;
      color: white;
    }
    .btn-refresh {
      background-color: transparent;
      border: 1px solid white;
      color: white;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
      100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }

    /* メインレイアウト */
    .container {
      display: flex;
      height: calc(100vh - 65px);
    }
    /* 左パネル (フォームQR) */
    .left-panel {
      width: 350px;
      background-color: white;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-right: 1px solid #ddd;
      box-shadow: 2px 0 5px rgba(0,0,0,0.05);
    }
    .left-panel h2 {
      font-size: 20px;
      color: var(--primary);
      margin-top: 0;
      text-align: center;
    }
    .qr-instruction {
      text-align: center;
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-light);
    }
    /* 右パネル (リスト) */
    .right-panel {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    .section-title {
      font-size: 22px;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 10px;
      margin-top: 0;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* 検索ボックスとフィルタータブの配置 */
    .list-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    /* 検索バー */
    .search-container {
      flex: 1;
      min-width: 250px;
      max-width: 400px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 10px 15px;
      padding-left: 35px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent);
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 14px;
    }

    /* フィルタータブのスタイル */
    .filter-tabs {
      display: flex;
      gap: 10px;
    }
    .tab-btn {
      padding: 8px 18px;
      border: 1px solid #ccc;
      background-color: white;
      color: var(--text-light);
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      background-color: #f0f0f0;
    }
    .tab-btn.active {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* カードUI */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border: 1px solid #eee;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .card-header {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    /* カードステータスバッジ */
    .badge {
      font-size: 11px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 12px;
    }
    .badge-unprinted {
      background-color: #e1f5fe;
      color: #0288d1;
    }
    .badge-printed {
      background-color: #eceff1;
      color: #546e7a;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: var(--primary);
      word-break: break-all;
    }
    .card-sender {
      font-size: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
    }
    .card-sender::before {
      content: '👤';
      margin-right: 8px;
    }
    
    .btn-print {
      background-color: var(--accent);
      color: white;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      margin-top: auto;
    }
    /* 発行済みの場合のボタン（再印刷） */
    .card.printed .btn-print {
      background-color: #95a5a6;
    }

    /* 隠しCanvas (印刷用) */
    #receiptCanvas {
      display: none;
    }
    
    /* ロード表示 */
    .loader {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
      font-size: 18px;
    }
  </style>
</head>
<body>

  <!-- =========================================
       🔐 簡易パスコード認証画面
       ========================================= -->
  <div id="auth-overlay">
    <div class="auth-box">
      <h2>🔑 システム認証</h2>
      <p>このシステムは昭和学院関係者専用です。<br>指定のパスコードを入力してください。</p>
      <input type="password" id="passcode-field" class="auth-input" placeholder="パスコード" maxlength="12">
      <button class="btn-auth" onclick="verifyPasscode()">ロック解除</button>
    </div>
  </div>

  <header>
    <div class="header-logo">
      <h1>研究データ QRレシート発行</h1>
      <div class="version-container">
        App: <span>1.1</span> | API: <span id="api-version">未ログイン</span>
      </div>
    </div>
    <div class="controls">
      <button id="printerBtn" class="btn-disconnected" onclick="connectPrinter()">⚠️ プリンタ未接続</button>
      <button id="testPrintBtn" class="btn-test" onclick="testPrint()" disabled>テスト印刷</button>
      <button class="btn-refresh" onclick="loadData()">↻ リロード</button>
    </div>
  </header>

  <div class="container">
    <!-- 左パネル: フォームへの誘導QR -->
    <div class="left-panel">
      <h2>データ送信フォーム</h2>
      <canvas id="formQrCanvas"></canvas>
      <div class="qr-instruction">
        <strong>スマホで読み取ってください</strong><br><br>
        写真やスライドのURLを<br>
        このフォームから送信すると、<br>
        右側のリストに追加されます。
      </div>
    </div>

    <!-- 右パネル: データリスト -->
    <div class="right-panel">
      <h2 class="section-title">
        登録データ一覧
        <span id="dataCount" style="font-size:16px; font-weight:normal; color:#7f8c8d;">(0件)</span>
      </h2>

      <!-- リスト制御エリア（検索 ＆ タブ） -->
      <div class="list-controls">
        <!-- 検索バー -->
        <div class="search-container">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-box" class="search-input" placeholder="送信者名、またはタイトルで絞り込み..." oninput="onSearchInput()">
        </div>

        <!-- フィルター用タブ（デフォルト「未発行のみ」） -->
        <div class="filter-tabs">
          <button id="tab-unprinted" class="tab-btn active" onclick="filterList('unprinted')">未発行のみ</button>
          <button id="tab-printed" class="tab-btn" onclick="filterList('printed')">発行済みのみ</button>
        </div>
      </div>

      <div id="receiptListContainer" class="card-grid">
        <div class="loader">データを読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- 印刷用Canvas -->
  <canvas id="receiptCanvas"></canvas>

  <script>
    // ==========================================
    // ⚙️ システム設定 ＆ セキュリティ設定
    // ==========================================
    
    // 現在のフロントエンド自体のバージョン
    const APP_VERSION = "1.1";

    // デプロイしたGASの「ウェブアプリURL」
    const GAS_API_URL = "https://script.google.com/a/macros/jsshowa.jp/s/AKfycbyZCDUkxZttZxGTVZMPiG3Lwk3ml7ghanIMUe-f8tziLo3ss3Su_N5430GYvbUWuiTjsA/exec";

    // 対象のGoogleフォームのURL
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScuHiaymg9NElDc1NE7oR0MKD4YXlElCRSoAGmJMLjKz94gRQ/viewform?usp=dialog";
    
    // セイコーインスツル RP-F10のベンダーID
    const SII_VENDOR_ID = 0x0619; 

    let usbPrinterDevice = null;
    let rawDataCache = []; // GASから受信した全データ
    let currentFilter = 'unprinted'; // デフォルト「未発行」

    // --- パスコード認証処理 ---
    
    document.addEventListener('DOMContentLoaded', () => {
      // 認証状態の確認 (ローカルに保存されたパスコードの存在確認)
      const savedPasscode = localStorage.getItem('receipt_system_passcode');
      if (savedPasscode) {
        document.getElementById('auth-overlay').style.display = 'none';
        initApp(savedPasscode);
      } else {
        // パスコード入力欄でEnterを押した時にも実行
        document.getElementById('passcode-field').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') verifyPasscode();
        });
      }
    });

    // 画面上でロック解除ボタンが押された時の処理
    async function verifyPasscode() {
      const field = document.getElementById('passcode-field');
      const input = field.value.trim();
      
      if (!input) {
        alert('パスコードを入力してください。');
        return;
      }

      // 入力されたパスコードで実際にGAS APIへテスト通信を試みる
      document.getElementById('receiptListContainer').innerHTML = '<div class="loader">認証中...</div>';
      
      try {
        const response = await fetch(`${GAS_API_URL}?action=getUnprinted&passcode=${encodeURIComponent(input)}`);
        if (!response.ok) throw new Error('通信エラーが発生しました');
        const resData = await response.json();
        
        // GAS側で認証に失敗した場合
        if (resData && resData.status === "error" && resData.auth === false) {
          alert('パスコードが正しくありません。');
          field.value = '';
          field.focus();
          return;
        }

        // 認証成功時、パスコードをブラウザに安全に保存
        localStorage.setItem('receipt_system_passcode', input);
        document.getElementById('auth-overlay').style.display = 'none';
        
        // アプリケーションを初期起動
        initApp(input, resData);

      } catch (err) {
        console.error(err);
        alert('サーバーとの通信に失敗しました。時間をおいて再試行してください。\n' + err.message);
      }
    }

    // --- アプリの初期化 ---

    async function initApp(passcode, initialData = null) {
      // 1. フォームへのQRコードを描画
      new QRious({
        element: document.getElementById('formQrCanvas'),
        value: FORM_URL,
        size: 250,
        level: 'H'
      });

      // 2. データの初期展開、または新規取得
      if (initialData) {
        processLoadedData(initialData);
      } else {
        loadData();
      }

      // 3. プリンタ自動接続チェック
      if (navigator.usb) {
        try {
          const devices = await navigator.usb.getDevices();
          const targetDevice = devices.find(d => d.vendorId === SII_VENDOR_ID);
          if (targetDevice) {
            await setupPrinter(targetDevice);
          }
        } catch (e) {
          console.log('プリンタ自動確認エラー:', e);
        }
      }
    }

    // --- データ取得・同期処理 (GAS API連携) ---

    async function loadData() {
      const container = document.getElementById('receiptListContainer');
      const apiVerLabel = document.getElementById('api-version');
      container.innerHTML = '<div class="loader">データを読み込み中...</div>';
      
      const savedPasscode = localStorage.getItem('receipt_system_passcode');
      if (!savedPasscode) {
        // 万が一ログイン情報が消えていた場合は再認証画面へ
        localStorage.removeItem('receipt_system_passcode');
        location.reload();
        return;
      }
      
      try {
        const response = await fetch(`${GAS_API_URL}?action=getUnprinted&passcode=${encodeURIComponent(savedPasscode)}`);
        if (!response.ok) throw new Error('サーバーエラーが発生しました');
        const resData = await response.json();
        
        // サーバー側で認証が期限切れ、または変更されていた場合
        if (resData && resData.status === "error" && resData.auth === false) {
          alert('セッションが切れました。再度パスコードを入力してください。');
          localStorage.removeItem('receipt_system_passcode');
          location.reload();
          return;
        }

        if (resData && resData.status === "error") {
          throw new Error(resData.message);
        }
        
        processLoadedData(resData);
      } catch (err) {
        container.innerHTML = `<div class="loader" style="color:red;">エラー: データの取得に失敗しました。<br>${err.message}</div>`;
        apiVerLabel.textContent = "エラー";
      }
    }

    // APIから正常に受信したデータを展開する共通処理
    function processLoadedData(resData) {
      const apiVerLabel = document.getElementById('api-version');
      
      if (resData.version) {
        apiVerLabel.textContent = resData.version;
        if (resData.version !== APP_VERSION) {
          console.warn(`[⚠️バージョン不一致] App: ${APP_VERSION} / API: ${resData.version}.`);
        }
      } else {
        apiVerLabel.textContent = "なし";
      }
      
      rawDataCache = resData.data;
      applyFilterAndRender();
    }

    // タブの切り替え
    function filterList(filterType) {
      currentFilter = filterType;
      
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${filterType}`).classList.add('active');
      
      applyFilterAndRender();
    }

    // 検索ボックスの入力イベント
    function onSearchInput() {
      applyFilterAndRender();
    }

    // フィルター ＆ 検索条件を適用して描画
    function applyFilterAndRender() {
      const container = document.getElementById('receiptListContainer');
      const searchQuery = document.getElementById('search-box').value.toLowerCase().trim();
      
      // 1. タブフィルターの適用
      let filteredData = [];
      if (currentFilter === 'unprinted') {
        filteredData = rawDataCache.filter(item => item.status === '未発行');
      } else if (currentFilter === 'printed') {
        filteredData = rawDataCache.filter(item => item.status === '発行済み');
      }

      // 2. 検索キーワードフィルターの適用
      if (searchQuery !== '') {
        filteredData = filteredData.filter(item => {
          const titleMatch = (item.title || '').toLowerCase().includes(searchQuery);
          const senderMatch = (item.sender || '').toLowerCase().includes(searchQuery);
          return titleMatch || senderMatch;
        });
      }

      document.getElementById('dataCount').textContent = `(${filteredData.length}件)`;

      if (filteredData.length === 0) {
        container.innerHTML = '<div class="loader">該当するデータはありません。</div>';
        return;
      }

      container.innerHTML = '';
      filteredData.forEach(item => {
        const card = createCardElement(item);
        container.appendChild(card);
      });
    }

    function createCardElement(item) {
      const div = document.createElement('div');
      div.id = `card-${item.id}`;
      
      const isPrinted = item.status === '発行済み';
      div.className = `card ${isPrinted ? 'printed' : ''}`;

      const formattedTime = item.timestamp.length >= 16 ? item.timestamp.substring(0, 16) : item.timestamp;
      
      const badgeHtml = isPrinted 
        ? `<span class="badge badge-printed" id="badge-${item.id}">発行済み</span>`
        : `<span class="badge badge-unprinted" id="badge-${item.id}">未発行</span>`;

      div.innerHTML = `
        <div class="card-header">
          <span>${formattedTime} 送信</span>
          ${badgeHtml}
        </div>
        <div class="card-title">${item.title}</div>
        <div class="card-sender">${item.sender}</div>
        <button class="btn-print" onclick="printReceipt('${item.id}')">
          ${isPrinted ? '再印刷する' : '印刷する'}
        </button>
      `;
      return div;
    }

    // --- プリンター制御 (WebUSB) ---

    async function connectPrinter() {
      if (!navigator.usb) {
        alert('エラー: お使いのブラウザはWebUSBに対応していません。Google Chromeを使用してください。');
        return;
      }
      
      try {
        const selectedDevice = await navigator.usb.requestDevice({
          filters: [{ vendorId: SII_VENDOR_ID }]
        });
        await setupPrinter(selectedDevice);
        alert('プリンタとの接続が完了しました。');
      } catch (error) {
        console.error('プリンタ接続エラー:', error);
        alert('プリンタの接続がキャンセルされたか、エラーが発生しました。\n' + error.message);
      }
    }

    async function setupPrinter(device) {
      usbPrinterDevice = device;
      await usbPrinterDevice.open();
      if (usbPrinterDevice.configuration === null) {
        await usbPrinterDevice.selectConfiguration(1);
      }
      await usbPrinterDevice.claimInterface(0);
      await usbPrinterDevice.close();
      
      const btn = document.getElementById('printerBtn');
      btn.textContent = '✅ プリンタ接続済み';
      btn.className = 'btn-connected';
      document.getElementById('testPrintBtn').disabled = false;
    }

    async function testPrint() {
      if (!usbPrinterDevice) {
        alert('プリンタを接続してください。');
        return;
      }
      const dummyItem = {
        title: "【テスト印刷】進捗スライド",
        sender: "昭和 太郎",
        timestamp: new Date().toLocaleString('ja-JP').substring(0, 16)
      };
      await executePrintProcess(dummyItem, null);
    }

    async function printReceipt(id) {
      if (!usbPrinterDevice) {
        alert('先に「プリンタ未接続」ボタンを押して、プリンタとペアリングしてください。');
        return;
      }

      const item = unprintedDataCache.find(d => d.id === id);
      if (!item) return;

      const cardDiv = document.getElementById(`card-${id}`);
      const printBtn = cardDiv.querySelector('.btn-print');
      const originalText = printBtn.textContent;
      
      printBtn.disabled = true;
      printBtn.textContent = '印刷処理中...';

      const savedPasscode = localStorage.getItem('receipt_system_passcode');

      try {
        const qr = new QRious({
          value: item.url,
          size: 340,
          level: 'M'
        });
        const base64Img = qr.toDataURL();

        // 1. プリンタへ印刷
        await executePrintProcess(item, base64Img);
        
        // 2. GAS APIへ印刷完了を通知 (セキュリティ用のパスコードも付与して送信)
        fetch(`${GAS_API_URL}?action=markPrinted&id=${item.id}&passcode=${encodeURIComponent(savedPasscode)}`)
          .then(res => res.json())
          .then(resData => {
            if(!resData.success) {
              console.warn('GAS側のステータス更新に失敗しました');
            } else {
              item.status = '発行済み';
            }
          })
          .catch(e => console.error('GAS API通信エラー:', e));
        
        // 3. UIその場更新
        cardDiv.classList.add('printed');
        printBtn.textContent = '再印刷する';
        printBtn.disabled = false;
        
        const badge = document.getElementById(`badge-${item.id}`);
        if (badge) {
          badge.textContent = '発行済み';
          badge.className = 'badge badge-printed';
        }

        // フィルターが掛かっている場合は1秒後にリフレッシュ
        if (currentFilter !== 'all') {
          setTimeout(() => { applyFilterAndRender(); }, 1000);
        }

      } catch (e) {
        console.error('印刷失敗:', e);
        alert('印刷処理に失敗しました。プリンタの接続を確認してください。');
        printBtn.disabled = false;
        printBtn.textContent = originalText;
      }
    }

    // --- 印刷用データ生成・送信ロジック ---

    async function executePrintProcess(item, base64Img = null) {
      const canvas = document.getElementById('receiptCanvas');
      const ctx = canvas.getContext('2d');
      
      const printerWidth = 576; 
      const paperWidth = 384; 
      const offsetX = (printerWidth - paperWidth) / 2; // 96
      
      const padding = 20;
      
      canvas.width = printerWidth;
      canvas.height = 620; 

      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, printerWidth, canvas.height);

      ctx.fillStyle = 'black';
      ctx.textBaseline = 'top';

      // ヘッダー
      ctx.font = 'bold 30px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('研究データ', offsetX + (paperWidth / 2), 20);

      // 区切り線
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(offsetX + padding, 65);
      ctx.lineTo(offsetX + paperWidth - padding, 65);
      ctx.stroke();

      // 情報テキスト
      ctx.font = '20px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'left';
      let currentY = 80;
      
      ctx.fillText(`送信者： ${item.sender}`, offsetX + padding, currentY);
      currentY += 35;
      
      const shortTitle = item.title.length > 15 ? item.title.substring(0, 15) + '...' : item.title;
      ctx.fillText(`タイトル： ${shortTitle}`, offsetX + padding, currentY);
      currentY += 35;

      const ts = item.timestamp.length >= 16 ? item.timestamp.substring(0, 16) : item.timestamp;
      ctx.fillText(`送信日時： ${ts}`, offsetX + padding, currentY);
      currentY += 40;

      // QRコードの描画
      await new Promise((resolve) => {
        if (base64Img) {
          const img = new Image();
          img.onload = () => {
            const qrSize = 340;
            const qrX = offsetX + (paperWidth - qrSize) / 2;
            ctx.drawImage(img, qrX, currentY, qrSize, qrSize);
            currentY += qrSize + 20;
            resolve();
          };
          img.src = base64Img;
        } else {
          ctx.textAlign = 'center';
          ctx.fillText('【QRコード表示エリア】', offsetX + (paperWidth / 2), currentY + 100);
          currentY += 340 + 20;
          resolve();
        }
      });

      // フッター
      ctx.font = '16px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('※ノートにはセロテープで', offsetX + (paperWidth / 2), currentY);
      ctx.fillText('　貼り付けてください（液体のり厳禁）', offsetX + (paperWidth / 2), currentY + 25);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      await sendRasterDataToPrinter(imageData);
    }

    async function sendRasterDataToPrinter(imageData) {
      if (!usbPrinterDevice) throw new Error('プリンタがペアリングされていません');
      
      await usbPrinterDevice.open();
      if (usbPrinterDevice.configuration === null) {
        await usbPrinterDevice.selectConfiguration(1);
      }
      await usbPrinterDevice.claimInterface(0);

      const imageCommand = convertToRasterCommand(imageData);
      const cutCommand = [0x1D, 0x56, 0x42, 0x00]; 

      const printData = new Uint8Array([
          0x1B, 0x40, 
          ...imageCommand,
          0x0A, 0x0A, 0x0A, 0x0A, 
          ...cutCommand
      ]);

      const endpointNumber = 1; 
      await usbPrinterDevice.transferOut(endpointNumber, printData);
      
      await usbPrinterDevice.close();
    }

    function convertToRasterCommand(imageData) {
      const width = imageData.width;
      const height = imageData.height;
      const bytesWidth = Math.ceil(width / 8); 

      const command = [
        0x1D, 0x76, 0x30, 0x00, 
        bytesWidth % 256, Math.floor(bytesWidth / 256),
        height % 256, Math.floor(height / 256)
      ];

      const threshold = 128;
      const data = imageData.data;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < bytesWidth; x++) {
          let byte = 0;
          for (let b = 0; b < 8; b++) {
            const px = x * 8 + b;
            if (px < width) {
              const offset = (y * width + px) * 4;
              const brightness = (data[offset] + data[offset + 1] + data[offset + 2]) / 3;
              if (brightness < threshold) {
                byte |= (1 << (7 - b));
              }
            }
          }
          command.push(byte);
        }
      }
      return command;
    }
  </script>
