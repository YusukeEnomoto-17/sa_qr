<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRレシート発行システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <!-- QRコード生成ライブラリ QRious -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  
  <style>
    :root {
      --primary: #2c3e50;
      --accent: #3498db;
      --success: #27ae60;
      --warning: #e74c3c;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #333333;
      --text-light: #7f8c8d;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
    }
    /* ヘッダー */
    header {
      background-color: var(--primary);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    header h1 {
      margin: 0;
      font-size: 24px;
    }
    .controls {
      display: flex;
      gap: 15px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover:not(:disabled) {
      opacity: 0.8;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
    .btn-disconnected {
      background-color: var(--warning);
      color: white;
      animation: pulse 2s infinite;
    }
    .btn-connected {
      background-color: var(--success);
      color: white;
    }
    .btn-test {
      background-color: #95a5a6;
      color: white;
    }
    .btn-refresh {
      background-color: transparent;
      border: 1px solid white;
      color: white;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
      100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }

    /* メインレイアウト */
    .container {
      display: flex;
      height: calc(100vh - 65px);
    }
    /* 左パネル (フォームQR) */
    .left-panel {
      width: 350px;
      background-color: white;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-right: 1px solid #ddd;
      box-shadow: 2px 0 5px rgba(0,0,0,0.05);
    }
    .left-panel h2 {
      font-size: 20px;
      color: var(--primary);
      margin-top: 0;
      text-align: center;
    }
    .qr-instruction {
      text-align: center;
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-light);
    }
    /* 右パネル (リスト) */
    .right-panel {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    .section-title {
      font-size: 22px;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 10px;
      margin-top: 0;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* カードUI */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border: 1px solid #eee;
      display: flex;
      flex-direction: column;
    }
    .card-header {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: var(--primary);
      word-break: break-all;
    }
    .card-sender {
      font-size: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
    }
    .card-sender::before {
      content: '👤';
      margin-right: 8px;
    }
    .btn-print {
      background-color: var(--accent);
      color: white;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      margin-top: auto;
    }

    /* 発行済みリスト（アコーディオン） */
    .accordion-toggle {
      background-color: #e0e0e0;
      color: var(--text);
      padding: 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      user-select: none;
      display: flex;
      justify-content: space-between;
    }
    .accordion-toggle:hover {
      background-color: #d5d5d5;
    }
    #printedList {
      display: none;
      margin-top: 20px;
      opacity: 0.7; /* 発行済みは少し薄く表示 */
    }
    #printedList .btn-print {
      background-color: #95a5a6; /* 再印刷はグレー */
    }

    /* 隠しCanvas (印刷用) */
    #receiptCanvas {
      display: none;
    }
    
    /* ロード表示 */
    .loader {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
      font-size: 18px;
    }
  </style>
</head>
<body>

  <header>
    <h1>研究データ QRレシート発行</h1>
    <div class="controls">
      <button id="printerBtn" class="btn-disconnected" onclick="connectPrinter()">⚠️ プリンタ未接続</button>
      <button id="testPrintBtn" class="btn-test" onclick="testPrint()" disabled>テスト印刷</button>
      <button class="btn-refresh" onclick="loadData()">↻ リロード</button>
    </div>
  </header>

  <div class="container">
    <!-- 左パネル: フォームへの誘導QR -->
    <div class="left-panel">
      <h2>データ送信フォーム</h2>
      <canvas id="formQrCanvas"></canvas>
      <div class="qr-instruction">
        <strong>スマホで読み取ってください</strong><br><br>
        写真やスライドのURLを<br>
        このフォームから送信すると、<br>
        右側のリストに追加されます。
      </div>
    </div>

    <!-- 右パネル: データリスト -->
    <div class="right-panel">
      <h2 class="section-title">
        未発行リスト
        <span id="unprintedCount" style="font-size:16px; font-weight:normal; color:#7f8c8d;">(0件)</span>
      </h2>
      <div id="unprintedList" class="card-grid">
        <div class="loader">データを読み込み中...</div>
      </div>

      <div class="accordion-toggle" onclick="togglePrintedList()">
        <span>発行済みリスト (この画面を開いてから発行したもの)</span>
        <span id="accordionIcon">▼</span>
      </div>
      <div id="printedList" class="card-grid">
        <!-- 印刷済みのカードがここに移動します -->
      </div>
    </div>
  </div>

  <!-- 印刷用Canvas -->
  <canvas id="receiptCanvas"></canvas>

  <script>
    // ==========================================
    // ⚙️ システム設定
    // ==========================================
    
    // 【重要】デプロイしたGASの「ウェブアプリURL」
    const GAS_API_URL = "https://script.google.com/a/macros/jsshowa.jp/s/AKfycbyZCDUkxZttZxGTVZMPiG3Lwk3ml7ghanIMUe-f8tziLo3ss3Su_N5430GYvbUWuiTjsA/exec";

    // 対象のGoogleフォームのURL
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScuHiaymg9NElDc1NE7oR0MKD4YXlElCRSoAGmJMLjKz94gRQ/viewform?usp=dialog";
    
    // セイコーインスツル RP-F10のベンダーID
    const SII_VENDOR_ID = 0x0619; 

    let usbPrinterDevice = null;
    let unprintedDataCache = [];

    // --- 初期化 ---
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. フォームへのQRコードを描画
      new QRious({
        element: document.getElementById('formQrCanvas'),
        value: FORM_URL,
        size: 250,
        level: 'H'
      });

      // 2. データの読み込み
      loadData();

      // 3. プリンタ自動接続チェック (ブラウザに記憶されたペアリング履歴から自動接続)
      if (navigator.usb) {
        try {
          const devices = await navigator.usb.getDevices();
          const targetDevice = devices.find(d => d.vendorId === SII_VENDOR_ID);
          if (targetDevice) {
            await setupPrinter(targetDevice);
          }
        } catch (e) {
          console.log('プリンタ自動確認エラー:', e);
        }
      }
    });

    // --- データ取得・同期処理 (GAS API連携) ---

    async function loadData() {
      const container = document.getElementById('unprintedList');
      container.innerHTML = '<div class="loader">データを読み込み中...</div>';
      
      try {
        const response = await fetch(`${GAS_API_URL}?action=getUnprinted`);
        if (!response.ok) throw new Error('サーバーエラーが発生しました');
        const data = await response.json();
        renderUnprintedList(data);
      } catch (err) {
        container.innerHTML = `<div class="loader" style="color:red;">エラー: データの取得に失敗しました。<br>${err.message}</div>`;
      }
    }

    function renderUnprintedList(data) {
      unprintedDataCache = data;
      const container = document.getElementById('unprintedList');
      document.getElementById('unprintedCount').textContent = `(${data.length}件)`;
      
      if (data.length === 0) {
        container.innerHTML = '<div class="loader">現在、未発行のデータはありません。</div>';
        return;
      }

      container.innerHTML = '';
      data.forEach(item => {
        const card = createCardElement(item);
        container.appendChild(card);
      });
    }

    function createCardElement(item) {
      const div = document.createElement('div');
      div.className = 'card';
      div.id = `card-${item.id}`;

      const formattedTime = item.timestamp.length >= 16 ? item.timestamp.substring(0, 16) : item.timestamp;

      div.innerHTML = `
        <div class="card-header">${formattedTime} 送信</div>
        <div class="card-title">${item.title}</div>
        <div class="card-sender">${item.sender}</div>
        <button class="btn-print" onclick="printReceipt('${item.id}')">印刷する</button>
      `;
      return div;
    }

    function togglePrintedList() {
      const list = document.getElementById('printedList');
      const icon = document.getElementById('accordionIcon');
      if (list.style.display === 'none' || list.style.display === '') {
        list.style.display = 'grid';
        icon.textContent = '▲';
      } else {
        list.style.display = 'none';
        icon.textContent = '▼';
      }
    }

    // --- プリンター制御 (WebUSB) ---

    async function connectPrinter() {
      if (!navigator.usb) {
        alert('エラー: お使いのブラウザはWebUSBに対応していません。Google Chromeを使用してください。');
        return;
      }
      
      try {
        const selectedDevice = await navigator.usb.requestDevice({
          filters: [{ vendorId: SII_VENDOR_ID }]
        });
        await setupPrinter(selectedDevice);
        alert('プリンタとの接続が完了しました。');
      } catch (error) {
        console.error('プリンタ接続エラー:', error);
        alert('プリンタの接続がキャンセルされたか、エラーが発生しました。\n' + error.message);
      }
    }

    async function setupPrinter(device) {
      usbPrinterDevice = device;
      await usbPrinterDevice.open();
      if (usbPrinterDevice.configuration === null) {
        await usbPrinterDevice.selectConfiguration(1);
      }
      await usbPrinterDevice.claimInterface(0);
      await usbPrinterDevice.close(); // 一度閉じて、印刷実行時に再オープンする
      
      const btn = document.getElementById('printerBtn');
      btn.textContent = '✅ プリンタ接続済み';
      btn.className = 'btn-connected';
      document.getElementById('testPrintBtn').disabled = false;
    }

    async function testPrint() {
      if (!usbPrinterDevice) {
        alert('プリンタを接続してください。');
        return;
      }
      const dummyItem = {
        title: "【テスト印刷】進捗スライド",
        sender: "昭和 太郎",
        timestamp: new Date().toLocaleString('ja-JP').substring(0, 16)
      };
      await executePrintProcess(dummyItem, null);
    }

    async function printReceipt(id) {
      if (!usbPrinterDevice) {
        alert('先に「プリンタ未接続」ボタンを押して、プリンタとペアリングしてください。');
        return;
      }

      const item = unprintedDataCache.find(d => d.id === id);
      if (!item) return;

      const cardDiv = document.getElementById(`card-${id}`);
      const printBtn = cardDiv.querySelector('.btn-print');
      const originalText = printBtn.textContent;
      
      printBtn.disabled = true;
      printBtn.textContent = '印刷処理中...';

      try {
        // 解像度を保つために生成サイズも 320 に引き上げ
        const qr = new QRious({
          value: item.url,
          size: 320,
          level: 'M'
        });
        const base64Img = qr.toDataURL();

        // 1. プリンタへ印刷データを送信して実行
        await executePrintProcess(item, base64Img);
        
        // 2. 印刷が通ったらバックグラウンドでGAS APIへ「印刷完了」を通知
        fetch(`${GAS_API_URL}?action=markPrinted&id=${item.id}`)
          .then(res => res.json())
          .then(resData => {
            if(!resData.success) console.warn('GAS側のステータス更新に失敗しました');
          })
          .catch(e => console.error('GAS API通信エラー:', e));
        
        // 3. 画面UI of更新 (未発行から発行済みへカードを移動)
        printBtn.textContent = '再印刷する';
        printBtn.disabled = false;
        document.getElementById('printedList').prepend(cardDiv);
        
        const currentCount = document.querySelectorAll('#unprintedList .card').length;
        document.getElementById('unprintedCount').textContent = `(${currentCount}件)`;
        if(currentCount === 0) {
            document.getElementById('unprintedList').innerHTML = '<div class="loader">現在、未発行のデータはありません。</div>';
        }

      } catch (e) {
        console.error('印刷失敗:', e);
        alert('印刷処理に失敗しました。プリンタの接続を確認してください。');
        printBtn.disabled = false;
        printBtn.textContent = originalText;
      }
    }

    // --- 印刷用データ生成・送信ロジック ---

    async function executePrintProcess(item, base64Img = null) {
      const canvas = document.getElementById('receiptCanvas');
      const ctx = canvas.getContext('2d');
      const width = 384; // 58mmの完全用紙ドット幅 (実印刷幅)
      const padding = 20;
      
      // QRコードサイズを320にしたのに伴い、全体の高さを450から620へ拡張
      canvas.width = width;
      canvas.height = 620; 

      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, width, canvas.height);

      ctx.fillStyle = 'black';
      ctx.textBaseline = 'top';

      // ヘッダー
      ctx.font = 'bold 30px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('研究データ', width / 2, 20);

      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(padding, 65);
      ctx.lineTo(width - padding, 65);
      ctx.stroke();

      // 情報テキスト
      ctx.font = '20px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'left';
      let currentY = 80;
      
      ctx.fillText(`送信者： ${item.sender}`, padding, currentY);
      currentY += 35;
      
      const shortTitle = item.title.length > 15 ? item.title.substring(0, 15) + '...' : item.title;
      ctx.fillText(`タイトル： ${shortTitle}`, padding, currentY);
      currentY += 35;

      const ts = item.timestamp.length >= 16 ? item.timestamp.substring(0, 16) : item.timestamp;
      ctx.fillText(`送信日時： ${ts}`, padding, currentY);
      currentY += 40;

      // QRコードの描画 (サイズを縦横160pxから「320px」へ拡張)
      await new Promise((resolve) => {
        if (base64Img) {
          const img = new Image();
          img.onload = () => {
            const qrSize = 320;
            // 384px幅の中央に配置 (左右余白 32px)
            ctx.drawImage(img, (width - qrSize) / 2, currentY, qrSize, qrSize);
            currentY += qrSize + 20;
            resolve();
          };
          img.src = base64Img;
        } else {
          ctx.textAlign = 'center';
          ctx.fillText('【QRコード表示エリア】', width/2, currentY + 100);
          currentY += 320 + 20;
          resolve();
        }
      });

      // フッター（のり厳禁の文言）
      ctx.font = '16px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('※ノートにはセロテープで', width / 2, currentY);
      ctx.fillText('　貼り付けてください（液体のり厳禁）', width / 2, currentY + 25);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      await sendRasterDataToPrinter(imageData);
    }

    async function sendRasterDataToPrinter(imageData) {
      if (!usbPrinterDevice) throw new Error('プリンタがペアリングされていません');
      
      await usbPrinterDevice.open();
      if (usbPrinterDevice.configuration === null) {
        await usbPrinterDevice.selectConfiguration(1);
      }
      await usbPrinterDevice.claimInterface(0);

      const imageCommand = convertToRasterCommand(imageData);
      const cutCommand = [0x1D, 0x56, 0x42, 0x00]; // カット

      const printData = new Uint8Array([
          0x1B, 0x40, // 初期化
          ...imageCommand,
          0x0A, 0x0A, 0x0A, 0x0A, // フィード
          ...cutCommand
      ]);

      const endpointNumber = 1; // 書き込み用の第1エンドポイント
      await usbPrinterDevice.transferOut(endpointNumber, printData);
      
      await usbPrinterDevice.close();
    }

    function convertToRasterCommand(imageData) {
      const width = imageData.width;
      const height = imageData.height;
      const bytesWidth = Math.ceil(width / 8); 

      const command = [
        0x1D, 0x76, 0x30, 0x00, 
        bytesWidth % 256, Math.floor(bytesWidth / 256),
        height % 256, Math.floor(height / 256)
      ];

      const threshold = 128;
      const data = imageData.data;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < bytesWidth; x++) {
          let byte = 0;
          for (let b = 0; b < 8; b++) {
            const px = x * 8 + b;
            if (px < width) {
              const offset = (y * width + px) * 4;
              const brightness = (data[offset] + data[offset + 1] + data[offset + 2]) / 3;
              if (brightness < threshold) {
                byte |= (1 << (7 - b));
              }
            }
          }
          command.push(byte);
        }
      }
      return command;
    }
  </script>
</body>
</html>
